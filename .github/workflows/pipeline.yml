name: Pipeline

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          mkdir -p creds
          printf '%s' "$GCP_SA_KEY" > creds/maneuver-marketing-test-625a0985781e.json

      - name: Write dbt profiles.yml
        run: |
          cat > dbt/profiles.yml <<EOF
          maneuver_marketing_test:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: maneuver-marketing-test
                dataset: ods
                location: US
                threads: 1
                priority: interactive
                job_execution_timeout_seconds: 300
                job_retries: 1
                keyfile: ${{ github.workspace }}/creds/maneuver-marketing-test-625a0985781e.json
          EOF

      - name: Run pipeline
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python pipeline.py

      - name: Notify Slack on workflow failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_STEP: ${{ github.job }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rotating_light: Pipeline workflow failed before pipeline.py could finish (job: ${FAILED_STEP}). <${RUN_URL}|View run> <@U0B148FR5GC>\"}" \
            "$SLACK_WEBHOOK_URL"
